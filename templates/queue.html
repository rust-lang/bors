<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bors queue - {{ repo_name }}</title>
  </head>
  <body>
    <h1>Bors queue - <a href="{{ repo_url }}" target="_blank">{{ repo_name }}</a></h1>

    <p>
        {{ stats.total_count }} total, {{ stats.approved_count }} approved,
        {{ stats.rolled_up_count }} rolled up, {{ stats.failed_count }} failed
    </p>

    <table>
        <thead>
            <th>#</th>
        </thead>

        <tbody>
            {% for pr in prs %}
            <tr>
                <td>
                    <a href="{{ repo_url }}/pull/{{ pr.number.0 }}">{{ pr.number.0 }}</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
  </body>
</html>
